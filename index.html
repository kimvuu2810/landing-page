<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Landing Pages</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f7f9fc; }
        h1 { color: #1a202c; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-decoration: none; color: #2d3748; transition: transform 0.2s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: #cbd5e0; }
        .card h2 { margin-top: 0; color: #2b6cb0; font-size: 1.25rem; }
        .card p { color: #718096; margin-bottom: 0; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>Danh sách Landing Pages</h1>
    <div class="grid">
        <a href="tri-an-20-nam/" class="card">
            <h2>Tri Ân 20 Năm (Nha Khoa Đông Nam)</h2>
            <p>Landing page chương trình tri ân 20 năm, giảm giá làm Implant, trám răng, nhổ răng khôn.</p>
        </a>
        <a href="landing-page-2/" class="card">
            <h2>Landing Page Mới</h2>
            <p>Bản sao của landing page gốc, dùng để xây dựng chiến dịch mới hoàn toàn độc lập (JS, CSS riêng).</p>
        </a>
    </div>
</body>
</html>
